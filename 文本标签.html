<!-- HTML文档的基本结构 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 设置网页的字符编码为UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 使网页在移动设备上能够正确缩放 -->
    <title>示例页面</title>
    <!-- 网页的标题，显示在浏览器标签页上 -->
</head>
<body>
    <!-- 页面主体内容开始 -->
    <h1>欢迎来到我的网站</h1>
    <h1>标题一</h1>
    <h2>标题二</h2>
    <!-- 主标题，使用h1标签定义 -->
    <p>这是我的第一个段落。</p>
    <p>这是第二段落。</p>
    <p>
        <b>字体加粗</b><strong>字体加粗</strong><i>斜体</i><u>下划线</u><s>删除线</s>
    </p>
    <!-- 段落文本，使用p标签定义 -->
    <ul>
        <li>列表项一</li>
        <li>列表项二</li>
    </ul>
    <!-- 无序列表，使用ul标签定义 -->
    <ol>
        <li>有序列表项一</li>
        <li>有序列表项二</li>
    </ol>
    <!-- 有序列表，使用ol标签定义 -->
    <table>
        <thead>
          <tr>
            <th>列标题1</th>
            <th>列标题2</th>
            <th>列标题3</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>行1，列1</td>
            <td>行1，列2</td>
            <td>行1，列3</td>
          </tr>
          <tr>
            <td>行2，列1</td>
            <td>行2，列2</td>
            <td>行2，列3</td>
          </tr>
        </tbody>
    </table>
    <!-- 表格，使用table标签定义 -->
    <a href="https://www.example.com">访问示例链接</a>
    <!-- 超链接，使用a标签定义，href属性指定链接的目标地址 -->
    <input type="text" id="exampleInput" name="exampleInput" placeholder="请输入文本">
    <!-- 文本输入框，使用input标签定义，type="text"指定为文本输入类型 -->
</body>
</html>
